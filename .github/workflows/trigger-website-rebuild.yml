name: Trigger Website Rebuild

on:
  push:
    branches:
      - main
    paths:
      - '[0-9][0-9]-*/**'
      - 'README.md'
      - 'SETUP.md'

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AGENTIC_LOOPS_GITHUB_APP_ID }}
          private-key: ${{ secrets.AGENTIC_LOOPS_GITHUB_APP_PRIVATE_KEY }}
          owner: agenticloops-ai
          repositories: agenticloops-website

      - name: Trigger website rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            https://api.github.com/repos/${{ vars.WEBSITE_REPO }}/dispatches \
            -d '{"event_type": "content-update", "client_payload": {"repository": "${{ github.repository }}", "ref": "${{ github.sha }}"}}'
